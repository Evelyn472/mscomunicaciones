server:
  port: 8090

spring:
  application:
    name: ms-comunicaciones

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_comunicaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html